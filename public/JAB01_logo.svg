<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#1a1c20" />
  
  <g transform="translate(200, 200)">
    <!-- Broken Circle -->
    <!-- Radius 90. Gap between -130 deg and -145 deg -->
    <path d="M -57.85 -68.94 A 90 90 0 1 1 -73.72 -51.62" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="3" 
          stroke-linecap="round" />
          
    <!-- Cyan Strokes -->
    <!-- Center of arcs: (-30, 0) -->
    <!-- Sweep from angle 0 to angle 75 degrees (down-left) -->
    
    <!-- Rightmost (Radius 55) -->
    <path d="M 25 -55 L 25 0 A 55 55 0 0 1 -15.76 53.12" 
          fill="none" 
          stroke="#1ea1da" 
          stroke-width="12" 
          stroke-linecap="round" />
          
    <!-- Middle (Radius 35) -->
    <path d="M 5 -30 L 5 0 A 35 35 0 0 1 -20.94 33.80" 
          fill="none" 
          stroke="#1ea1da" 
          stroke-width="12" 
          stroke-linecap="round" />
          
    <!-- Leftmost (Radius 15) -->
    <path d="M -15 -5 L -15 0 A 15 15 0 0 1 -26.11 14.48" 
          fill="none" 
          stroke="#1ea1da" 
          stroke-width="12" 
          stroke-linecap="round" />
  </g>
</svg>
